<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🏫 School Management System - Admin Login</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />

    <style>
        :root {
            --primary: #1a3a5c;
            --primary-light: #2a5a8c;
            --accent: #f39c12;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header i {
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .login-header h1 {
            color: var(--primary);
            font-weight: 800;
            font-size: 1.8rem;
            margin: 0 0 8px 0;
        }

        .login-header p {
            color: #666;
            font-size: 0.95rem;
            margin: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(42, 90, 140, 0.15);
            outline: none;
        }

        .form-control::placeholder {
            color: #aaa;
        }

        .password-toggle {
            cursor: pointer;
            color: var(--primary);
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
        }

        .password-group {
            position: relative;
        }

        .login-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 58, 92, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .forgot-password {
            text-align: right;
            margin-top: 12px;
        }

        .forgot-password a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .demo-credentials {
            background: #f0f4f8;
            border-left: 4px solid var(--accent);
            border-radius: 8px;
            padding: 15px;
            margin-top: 25px;
            font-size: 0.85rem;
            color: #333;
        }

        .demo-credentials strong {
            color: var(--primary);
        }

        .demo-credentials p {
            margin: 6px 0;
        }

        .loader {
            display: none;
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            animation: spin 1s linear infinite;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .login-btn.loading {
            position: relative;
            color: transparent;
        }

        .login-btn.loading .loader {
            display: block;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 1.4rem;
            }

            .login-header i {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- Header -->
        <div class="login-header">
            <i class="bi bi-mortarboard-fill"></i>
            <h1>School Admin</h1>
            <p>Management System Login</p>
        </div>

        <!-- Messages -->
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username"><i class="bi bi-person"></i> Username</label>
                <input 
                    type="text" 
                    class="form-control" 
                    id="username" 
                    placeholder="Enter your username"
                    autocomplete="username"
                    required 
                />
            </div>

            <div class="form-group">
                <label for="password"><i class="bi bi-lock"></i> Password</label>
                <div class="password-group">
                    <input 
                        type="password" 
                        class="form-control" 
                        id="password" 
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required 
                    />
                    <i class="bi bi-eye password-toggle" onclick="togglePassword()"></i>
                </div>
            </div>

            <div class="forgot-password">
                <a href="#" onclick="showForgotPassword(event)">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">
                <span><i class="bi bi-box-arrow-in-right"></i> Login</span>
                <div class="loader"></div>
            </button>
        </form>

        <!-- Demo Credentials -->
        <div class="demo-credentials">
            <strong><i class="bi bi-info-circle"></i> Demo Login Credentials:</strong>
            <p><strong>Username:</strong> admin</p>
            <p><strong>Password:</strong> admin123</p>
        </div>
    </div>

    <script>
        // Demo credentials - In production, use proper backend authentication
        const VALID_CREDENTIALS = {
            admin: 'admin123',
            teacher: 'teacher123',
            principal: 'principal123'
        };

        function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = event.target.querySelector('.login-btn');
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');

            // Clear previous messages
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            // Validate inputs
            if (!username || !password) {
                errorMsg.textContent = '❌ Please enter both username and password';
                errorMsg.style.display = 'block';
                return;
            }

            // Show loading state
            loginBtn.classList.add('loading');

            // Simulate network delay
            setTimeout(() => {
                // Check credentials
                if (VALID_CREDENTIALS[username] && VALID_CREDENTIALS[username] === password) {
                    // Success
                    successMsg.textContent = '✅ Login successful! Redirecting...';
                    successMsg.style.display = 'block';

                    // Store session
                    localStorage.setItem('adminUser', username);
                    localStorage.setItem('loginTime', new Date().toISOString());

                    // Redirect after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    // Failed
                    errorMsg.textContent = '❌ Invalid username or password';
                    errorMsg.style.display = 'block';
                    loginBtn.classList.remove('loading');

                    // Clear password
                    document.getElementById('password').value = '';
                }
            }, 1000);
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggle = document.querySelector('.password-toggle');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggle.classList.remove('bi-eye');
                toggle.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggle.classList.remove('bi-eye-slash');
                toggle.classList.add('bi-eye');
            }
        }

        function showForgotPassword(event) {
            event.preventDefault();
            alert('📧 Password Reset\n\nPlease contact your school administrator to reset your password.\n\nAdmin Email: admin@school.com');
        }

        // Check if already logged in
        window.addEventListener('load', () => {
            const adminUser = localStorage.getItem('adminUser');
            if (adminUser) {
                // User already logged in, redirect to dashboard
                window.location.href = 'index.html';
            }
        });

        // Allow Enter key to submit form
        document.getElementById('loginForm').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.querySelector('.login-btn').click();
            }
        });
    </script>

</body>
</html>
